---
- name: Setup awx
  hosts: k3s-master01
  become: true

  vars:
    awx_operator_version: "2.19.1"
    awx_version: "24.6.1"
    awx_organization: Default
    awx_connection: &awx_connection
      controller_host: "http://localhost:30080"
      controller_username: "admin"
      controller_password: "password"

  tasks:

  - name: Install kustomize
    ansible.builtin.unarchive:
      src: https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.0.1/kustomize_v5.0.1_linux_amd64.tar.gz
      dest: /usr/local/bin
      creates: /usr/local/bin/kustomize
      remote_src: yes
      mode: '0755'

  - name: Ensure directory exists
    ansible.builtin.file:
      path: "{{ item }}"
      state: directory
      mode: '0755'
    with_items:
    - /var/lib/rancher/k3s/server/kustomizations
    - /var/lib/rancher/k3s/server/kustomizations/awx-operator

  - name: kustomization.yaml
    ansible.builtin.copy:
      dest: /var/lib/rancher/k3s/server/kustomizations/awx-operator/kustomization.yaml
      content: |
        ---
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        namespace: awx
        resources:
        - github.com/ansible/awx-operator/config/default?ref={{ awx_operator_version }}
        images:
        - name: quay.io/ansible/awx-operator
          newTag: {{ awx_operator_version }}
      owner: root
      group: root
      mode: '0600'
    register: kustomization

  - name: Run kubectl apply -k /var/lib/rancher/k3s/server/kustomizations/awx-operator
    ansible.builtin.command: /usr/local/bin/kubectl apply -k /var/lib/rancher/k3s/server/kustomizations/awx-operator
    when: kustomization.changed

  - name: awx.yaml
    ansible.builtin.copy:
      dest: /var/lib/rancher/k3s/server/manifests/awx.yaml
      content: |
        ---
        apiVersion: v1
        kind: Secret
        metadata:
          name: awx-admin-password
          namespace: awx
        stringData:
          password: password

        ---
        apiVersion: awx.ansible.com/v1beta1
        kind: AWX
        metadata:
          name: awx
          namespace: awx
        spec:
          service_type: NodePort
          nodeport_port: 30080
          image: quay.io/ansible/awx
          image_version: {{ awx_version }}
          admin_user: admin
          admin_password_secret: awx-admin-password

      owner: root
      group: root
      mode: '0600'

  - ansible.builtin.include_role:
      name: awx

  - name: Add Credentials
    awx.awx.credential:
      name: root
      credential_type: Machine
      organization: "{{ awx_organization }}"
      inputs:
        username: root
        password: "root"
      <<: *awx_connection

  - name: Add projects
    awx.awx.project:
      name: "awx"
      description: "awx"
      organization: "{{ awx_organization }}"
      state: present
      scm_type: git
      scm_url: https://github.com/valengus/awx.git
      scm_update_on_launch: false
      <<: *awx_connection

  - name: Add inventories
    awx.awx.inventory:
      name: "local"
      organization: "{{ awx_organization }}"
      state: present
      <<: *awx_connection

  - name: Add an inventory source
    awx.awx.inventory_source:
      name: "git-inventory-local"
      inventory: local
      overwrite: True
      update_on_launch: True
      organization: "{{ awx_organization }}"
      source: scm
      source_project: awx
      source_path: projects/local/inventories/hosts.ini
      <<: *awx_connection

  - name: Update Inventory source
    awx.awx.inventory_source_update:
      name: "git-inventory-local"
      inventory: "local"
      organization: "{{ awx_organization }}"
      wait: true
      <<: *awx_connection

  - name: Create job template
    awx.awx.job_template:
      name: "{{ item.name }}"
      job_type: "{{ item.job_type }}"
      organization: "{{ awx_organization }}"
      inventory: "{{ item.inventory }}"
      project: "{{ item.project }}"
      playbook: "{{ item.playbook }}"
      credentials: "{{ item.credentials }}"
      state: "present"
      <<: *awx_connection
    with_items:
    - { name: awx-setup, job_type: run, organization: "{{ awx_organization }}", inventory: local, project: awx, playbook: projects/local/playfile/awx-setup.yml, credentials: [root] }
